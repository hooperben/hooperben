<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Example</title>
  </head>
  <body>
    <canvas id="qr-canvas"></canvas>
    <!-- <script src="generateQR.js"></script> -->

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator/qrcode.min.js"></script>
    <script>
      let qwcode = new qrcode.QRCode(document.getElementById("qr-canvas"), {
        text: "https://example.com",
        width: 128,
        height: 128,
        colorDark: "#000000",
        colorLight: "#ffffff",
      });
    </script>
  </body>
</html>
